services:
  runtime:
    image: robosuite
    depends_on:
      - openpi_server
    build:
      context: ../..
      dockerfile: examples/robosuite/Dockerfile
    init: true
    tty: true
    network_mode: host # Keep this for now unless it causes other issues
    privileged: true # REMOVE or comment out this line (try removing later)
    volumes:
      - $PWD:/app
      - ../../data:/data
      # ---> ADD THIS LINE: Mount your local Robosuite source code <---
      - ../../../robosuite:/robosuite_source # Host path : Container path
      - ../../../robosuite-task-zoo:/robosuite_task_zoo_source # Host path : Container path
      # Mount dataset_making and planning modules
      - ../../../dataset_making:/app/dataset_making
      - ../../../planning:/app/planning
      - ../../../tarski:/tarski
      - ../../../Metric-FF-v2.1:/app/Metric-FF-v2.1
      - /tmp/.X11-unix:/tmp/.X11-unix:ro # REMOVE or comment out this line
    environment:
      - PYTHONPATH=/robosuite_source:${PYTHONPATH}
      - PYTHONPATH=/robosuite_source:/app:/app/packages/openpi-client/src:/app/third_party/libero
      - WANDB_API_KEY=${WANDB_API_KEY}
      - DISPLAY=$DISPLAY
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=osmesa
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              # --> FIX: Add 'graphics', 'compute', 'utility' <--
              capabilities: [gpu, graphics, compute, utility] # Or use [all] for testing

  openpi_server:
    # ... (Keep the openpi_server definition as is, its capabilities: [gpu] is likely fine) ...
    image: openpi_server
    build:
      context: ../..
      dockerfile: scripts/docker/serve_policy.Dockerfile
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      # - SERVER_ARGS=policy:checkpoint --policy.config pi0_cube_sorting_lora --policy.dir /app/checkpoints/pi0_cube_sorting_lora/cube_sorting/29999
      - SERVER_ARGS=policy:checkpoint --policy.config pi05_hanoi_50_lora --policy.dir /app/checkpoints/pi05_hanoi_50_lora/pi05_hanoi_50_lora/29999
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]