services:
  runtime:
    image: robosuite
    depends_on:
      - openpi_server
    build:
      context: ../..
      dockerfile: examples/robosuite/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true 
    volumes:
      - $PWD:/app  # openpi
      - ../../data:/data
      - ../../../robosuite:/robosuite_source  # Custom Robosuite envs
      - ../../../robosuite-task-zoo:/robosuite_task_zoo_source  # Build req
      - ../../../dataset_making:/app/dataset_making
      - ../../../planning:/app/planning
      - ../../../tarski:/tarski
      - ../../../Metric-FF-v2.1:/app/Metric-FF-v2.1  # Planner
      - /tmp/.X11-unix:/tmp/.X11-unix:ro 
    environment:
      - PYTHONPATH=/robosuite_source:${PYTHONPATH}
      - PYTHONPATH=/robosuite_source:/app:/app/packages/openpi-client/src:/app/third_party/libero
      - WANDB_API_KEY
      - WANDB_MODE
      - DISPLAY=$DISPLAY
      - NVIDIA_DRIVER_CAPABILITIES=graphics,compute,utility
      - MUJOCO_GL=osmesa
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, graphics, compute, utility]
  openpi_server:
    image: openpi_server
    build:
      context: ../..
      dockerfile: scripts/docker/serve_policy.Dockerfile
    init: true
    tty: true
    network_mode: host
    runtime: nvidia
    privileged: true
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - SERVER_ARGS=policy:checkpoint --policy.config pi0_hanoi_end_to_end --policy.dir /app/checkpoints/pi0_hanoi_end_to_end/pi0_hanoi_end_to_end/29999
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
